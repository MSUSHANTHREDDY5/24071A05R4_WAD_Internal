<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        #weatherCard {
            margin-top: 10px;
        }

        #cityName {
            font-size: 22px;
            font-weight: 600;
        }

        #currentTemp {
            font-size: 30px;
            font-weight: bold;
            color: #007bff;
        }

        #weatherDesc {
            margin-bottom: 15px;
            color: #555;
        }

        .chart-wrapper {
            height: 200px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <h1>🌤 Weather Dashboard</h1>

        <div class="controls">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button id="searchBtn">Search</button>
        </div>

        <div id="error-message" class="error hidden"></div>

        <div id="weatherCard" class="hidden">
            <h2 id="cityName"></h2>
            <div><span id="currentTemp"></span>°C</div>
            <div id="weatherDesc"></div>

            <div class="chart-wrapper">
                <canvas id="weatherChart"></canvas>
            </div>
        </div>
    </div>

    <script src="weather.js"></script>

</body>
</html>
